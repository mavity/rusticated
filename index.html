<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rusticated README</title>
    <!-- Load Marked.js to parse the Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fcfcfc;
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Gentle emptiness at the start */
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 820px;
            width: 100%;
            margin: 40px 20px;
            padding: 40px;
            background: #ffffff;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            border-radius: 8px;
            line-height: 1.6;
            box-sizing: border-box;
        }

        h1, h2, h3 { 
            border-bottom: 1px solid #eaecef; 
            padding-bottom: 0.3em;
            margin-top: 1.5em;
        }
        
        h1 { margin-top: 0; }

        code { 
            background: #f6f8fa; 
            padding: 0.2em 0.4em; 
            border-radius: 3px; 
            font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace; 
            font-size: 0.9em;
        }

        pre { 
            background: #f6f8fa; 
            padding: 16px; 
            border-radius: 6px; 
            overflow: auto; 
        }

        pre code { 
            background: none; 
            padding: 0; 
        }

        blockquote { 
            border-left: 4px solid #dfe2e5; 
            color: #6a737d; 
            padding: 0 1em; 
            margin: 0 0 16px 0; 
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 16px;
        }

        table th, table td {
            border: 1px solid #dfe2e5;
            padding: 6px 13px;
        }

        table tr:nth-child(2n) {
            background-color: #f6f8fa;
        }
        
        #error-msg {
            color: #d73a49;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body id="main-body">
    <div id="content" class="container">
        <!-- Rendered markdown goes here -->
    </div>

    <!-- 
      Pull in README.md dynamically.
      This works over file:// purely because README.md is polyglot Javascript and Markdown 
    -->
    <script src="README.md"></script>

    <script>
        window.onload = () => {
            const contentDiv = document.getElementById('content');
            
            try {
                if (typeof __README__ === 'function') {
                    // Extract the string inside the multiline JS comment block
                    const funcStr = __README__.toString();
                    const startIdx = funcStr.indexOf('/*') + 2;
                    const endIdx = funcStr.lastIndexOf('*/');
                    
                    if (startIdx !== -1 && endIdx !== -1) {
                        let rawMarkdown = funcStr.substring(startIdx, endIdx);
                        
                        // Clean up the `-->` and `<!--` overhangs that were captured inside the JS comment
                        rawMarkdown = rawMarkdown.replace(/^\s*-->\s*/, '').replace(/\s*<!--\s*$/, '');
                        
                        // Parse using Marked and inject it seamlessly
                        contentDiv.innerHTML = marked.parse(rawMarkdown);
                    } else {
                        throw new Error("Could not find polyglot comment boundaries.");
                    }
                } else {
                    throw new Error("__README__ function not found in README.md script payload.");
                }
            } catch (err) {
                console.error(err);
                contentDiv.innerHTML = `<p id="error-msg">Failed to load README.md.<br><small>${err.message}</small></p>`;
            }

            // Beautifully fade the content in (Gentle emptiness)
            document.getElementById('main-body').style.opacity = 1;
        };
    </script>
</body>
</html>
