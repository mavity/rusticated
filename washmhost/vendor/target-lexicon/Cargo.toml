[package]
name = "target-lexicon"
version = "0.12.16"
edition = "2018"
description = "Targeting utilities for compilers and related tools (rusticated shim)"
build = "build.rs"

[lib]
name = "target_lexicon"
path = "src/lib.rs"

[features]
default = []
std = []
arch_zkasm = []
serde_support = ["serde", "std"]

[dependencies.serde]
version = "1.0"
optional = true
