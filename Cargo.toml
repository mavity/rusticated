[workspace]

[workspace.package]
edition = "2024"
license = "MIT"
readme = "README.md"
repository = "https://github.com/oyin-bo/fast-std"
rust-version = "1.88.0"

[workspace.lints.rust]
warnings = { level = "deny" }
future_incompatible = { level = "deny" }
missing_docs = { level = "deny" }
nonstandard_style = { level = "deny" }
rust_2018_idioms = { level = "deny", priority = -1 }
unsafe_op_in_unsafe_fn = "deny"
unknown_lints = { level = "allow", priority = -100 }
# fast-std intentionally uses native `async fn` in traits (no async-trait crate).
async_fn_in_trait = { level = "allow", priority = 1 }

[workspace.lints.rustdoc]
all = { level = "deny", priority = -1 }

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
cargo = { level = "deny", priority = -1 }
nursery = { level = "deny", priority = -1 }
perf = { level = "deny", priority = -1 }
expect_used = "deny"
panic = "deny"
panic_in_result_fn = "deny"
todo = "deny"
unwrap_in_result = "deny"
unwrap_used = "deny"
undocumented_unsafe_blocks = "deny"
bool_to_int_with_if = "allow"
cognitive_complexity = "allow"
collapsible_else_if = "allow"
collapsible_if = "allow"
future_not_send = "allow"
if_not_else = "allow"
if_same_then_else = "allow"
match_same_arms = "allow"
missing_errors_doc = "allow"
must_use_candidate = "allow"
multiple_crate_versions = "allow"
option_if_let_else = "allow"
redundant_closure_for_method_calls = "allow"
redundant_else = "allow"
redundant_pub_crate = "allow"
result_large_err = "allow"
similar_names = "allow"
struct_excessive_bools = "allow"

[package]
name = "fast-std"
description = "Fast, standard-library-shaped async platform layer for brush-async"
version = "0.1.0"
categories = ["command-line-utilities", "development-tools"]
edition.workspace = true
keywords = ["cli", "shell", "bash"]
license.workspace = true
readme.workspace = true
repository.workspace = true
rust-version.workspace = true

[lib]
bench = false

[lints]
workspace = true

[features]
default = []

[dependencies]
thiserror = "2.0.18"

[target.'cfg(not(target_family = "wasm"))'.dependencies]
compio-driver = { version = "0.12.0-rc.1", path = "../compio-no-std/compio-driver" }
compio-buf = { version = "0.8.2-rc.1", path = "../compio-no-std/compio-buf" }

[target.'cfg(target_family = "wasm")'.dependencies]
getrandom = { version = "0.4.2" }

[target.'cfg(unix)'.dependencies]
reedline-async = { path = "../reedline-async" }
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61", features = ["Win32_Foundation", "Win32_System_Console"] }

